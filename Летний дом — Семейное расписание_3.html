<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Летний дом — семейное расписание</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap&subset=cyrillic" rel="stylesheet">
<style>
:root{
  --porcelain:#F3F2EE; --white:#FFFFFF; --graphite:#36373B; --onyx:#1C1C1E;
  --copper:#9F6B47; --ash:#8E8E8A; --hairline:#E2E0D9; --taupe:#7C6A58;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--porcelain); color:var(--graphite);
  font-family:'Inter',-apple-system,'Segoe UI',sans-serif;
  font-size:14px; line-height:1.45;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select,textarea{font:inherit;color:var(--graphite)}
::selection{background:rgba(159,107,71,.18)}
:focus-visible{outline:1.5px solid var(--copper);outline-offset:2px;border-radius:2px}

.wrap{max-width:1180px;margin:0 auto;padding:26px 20px 90px}

/* ── Masthead ─────────────────────────── */
.masthead{display:flex;justify-content:space-between;align-items:flex-end;gap:16px}
.masthead h1{
  font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;
  font-size:clamp(26px,4.5vw,36px);line-height:1;color:var(--onyx);letter-spacing:.01em;
}
.masthead .meta{text-align:right;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ash);line-height:1.8;white-space:nowrap}
.masthead .meta b{font-weight:500;color:var(--graphite)}
.dbl{margin-top:16px;border-top:1px solid var(--hairline)}
.dbl::after{content:'';display:block;border-top:1px solid var(--hairline);margin-top:3px}

/* ── Member tabs ──────────────────────── */
.tabs{display:flex;gap:8px;overflow-x:auto;padding:18px 0 4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:0 0 auto;display:flex;align-items:baseline;gap:7px;
  padding:8px 14px;border:1px solid var(--hairline);border-radius:2px;
  background:var(--white);white-space:nowrap;
}
.tab .ix{font-size:9px;letter-spacing:.16em;color:var(--ash)}
.tab .nm{font-size:12.5px;font-weight:500;color:var(--graphite)}
.tab.on{border-color:var(--graphite)}
.tab.on .ix{color:var(--copper)}
.tab.on .nm{color:var(--onyx)}

/* ── Toolbar ──────────────────────────── */
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin:16px 0 18px}
.seg{display:flex;border:1px solid var(--hairline);border-radius:2px;background:var(--white);overflow:hidden}
.seg button{padding:7px 14px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ash)}
.seg button+button{border-left:1px solid var(--hairline)}
.seg button.on{color:var(--onyx);font-weight:500;box-shadow:inset 0 -2px 0 var(--copper)}
.datenav{display:flex;align-items:center;gap:2px;margin-left:auto}
.datenav .lbl{font-size:13px;font-weight:500;color:var(--onyx);padding:0 10px;min-width:150px;text-align:center}
.icobtn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:1px solid var(--hairline);border-radius:2px;background:var(--white)}
.icobtn svg{stroke:var(--graphite);stroke-width:1.5;fill:none;stroke-linecap:round}
.todaybtn{padding:7px 12px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--graphite);border:1px solid var(--hairline);border-radius:2px;background:var(--white)}
.addbtn{
  padding:8px 16px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--porcelain);background:var(--graphite);border-radius:2px;font-weight:500;
}
.addbtn:hover{background:var(--onyx)}

/* ── Views ────────────────────────────── */
.viewtitle{display:flex;align-items:baseline;gap:10px;margin:2px 0 14px}
.viewtitle .who{font-family:'Cormorant Garamond',Georgia,serif;font-size:21px;font-weight:500;color:var(--onyx)}
.viewtitle .hint{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ash)}

/* ── time grid (день / неделя) ─────────── */
.tgwrap{
  background:var(--white);border:1px solid var(--hairline);border-radius:2px;
  overflow:auto;max-height:76vh;overscroll-behavior:contain;
  -webkit-overflow-scrolling:touch;
}
.tgrid{display:grid}
.tg-corner{
  position:sticky;top:0;left:0;z-index:6;background:var(--white);
  border-bottom:1px solid var(--hairline);
  font-size:9px;letter-spacing:.14em;color:var(--ash);
  display:flex;align-items:flex-end;justify-content:flex-end;padding:6px;
}
.tg-head{
  position:sticky;top:0;z-index:5;background:var(--white);
  border-bottom:1px solid var(--hairline);border-left:1px solid var(--hairline);
  padding:8px 10px;min-width:0;
}
.tg-head .wd{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ash);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tg-head .dn{font-size:13px;color:var(--graphite);font-variant-numeric:tabular-nums;margin-top:1px}
.tg-head.today .wd,.tg-head.today .dn{color:var(--copper)}
.tg-head .tonebar{height:2px;border-radius:1px;margin-top:6px}
.adchip{
  font-size:10px;color:var(--taupe);margin-top:4px;cursor:pointer;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.tg-axis{
  position:sticky;left:0;z-index:4;background:var(--white);
  border-right:1px solid var(--hairline);
}
.tg-axis .hl{
  position:absolute;right:7px;transform:translateY(-6px);
  font-size:10px;color:var(--ash);font-variant-numeric:tabular-nums;
}
.tg-col{
  position:relative;border-left:1px solid var(--hairline);min-width:0;
  background-image:repeating-linear-gradient(to bottom,
    var(--hairline) 0, var(--hairline) 1px, transparent 1px, transparent var(--hh));
  cursor:copy;
}
.tg-ev{
  position:absolute;border:1px solid var(--hairline);border-radius:2px;
  border-left:3px solid var(--tone,var(--graphite));
  padding:4px 7px 3px;overflow:hidden;cursor:pointer;z-index:1;
}
.tg-ev .t{font-size:9.5px;color:var(--ash);font-variant-numeric:tabular-nums;letter-spacing:.04em}
.tg-ev .n{font-size:11.5px;font-weight:500;color:var(--graphite);line-height:1.25}
.tg-ev .m{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--taupe);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tg-ev.compact{padding:2px 6px}
.tg-ev.compact .t,.tg-ev.compact .m{display:none}
.tg-ev.compact .n{font-size:10.5px}
.tg-ev:hover{z-index:3;border-color:var(--ash);border-left-color:var(--tone,var(--graphite))}
.nowline{position:absolute;left:0;right:0;border-top:1.5px solid var(--copper);z-index:2;pointer-events:none}
.nowline::before{content:'';position:absolute;left:-2px;top:-3.5px;width:6px;height:6px;background:var(--copper);border-radius:50%}

/* общие свободные окна */
.freechips{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:0 0 12px}
.freechips .flbl{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ash)}
.freechips .chip{
  font-size:12px;padding:5px 11px;border:1px solid var(--hairline);border-radius:2px;
  background:var(--white);color:var(--graphite);font-variant-numeric:tabular-nums;
}
.freechips .none{font-size:12px;color:var(--ash)}
.daysummary{font-size:11px;color:var(--ash);letter-spacing:.06em;margin:-6px 0 12px}
.dayempty{background:var(--white);border:1px solid var(--hairline);border-radius:2px;padding:34px 24px;max-width:640px;text-align:center}
.dayempty p{font-size:13px;color:var(--ash);margin-bottom:14px}

/* month view */
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.mwd{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ash);text-align:left;padding:2px 4px 6px;font-weight:500}
.mcell{background:var(--white);border:1px solid var(--hairline);border-radius:2px;min-height:88px;padding:8px;cursor:pointer;display:flex;flex-direction:column;gap:4px}
.mcell:hover{border-color:var(--ash)}
.mcell .num{font-size:12px;color:var(--graphite);font-variant-numeric:tabular-nums}
.mcell.dim{background:transparent}
.mcell.dim .num{color:var(--hairline)}
.mcell.today .num{color:var(--copper);font-weight:600}
.mcell .mini{font-size:10px;color:var(--ash);line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mcell .mini b{font-weight:500;color:var(--graphite)}
.mcell .more{font-size:10px;color:var(--copper);letter-spacing:.06em}

/* ── Modals ───────────────────────────── */
.scrim{position:fixed;inset:0;background:rgba(28,28,30,.32);display:none;align-items:flex-end;justify-content:center;z-index:40;padding:0}
.scrim.on{display:flex}
.sheet{
  background:var(--white);border:1px solid var(--hairline);border-radius:2px 2px 0 0;
  width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:24px 24px 30px;
}
@media(min-width:600px){.scrim{align-items:center;padding:24px}.sheet{border-radius:2px}}
.sheet h2{font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:23px;color:var(--onyx)}
.sheet .sub{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ash);margin-top:3px}
.sheet .dbl{margin:14px 0 18px}
.frow{margin-bottom:15px}
.frow label{display:block;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ash);margin-bottom:6px}
.frow input[type=text],.frow input[type=date],.frow input[type=time],.frow select,.frow textarea{
  width:100%;padding:9px 11px;border:1px solid var(--hairline);border-radius:2px;background:var(--white);font-size:14px;
}
.frow textarea{resize:vertical;min-height:56px}
.frow input:focus,.frow select:focus,.frow textarea:focus{outline:none;border-color:var(--copper)}
.frow .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chk{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--graphite)}
.chk input{accent-color:var(--copper);width:15px;height:15px}
.wdays{display:flex;gap:6px;flex-wrap:wrap}
.wdays button{width:40px;padding:7px 0;border:1px solid var(--hairline);border-radius:2px;font-size:11px;letter-spacing:.08em;color:var(--ash);background:var(--white)}
.wdays button.on{border-color:var(--copper);color:var(--copper);font-weight:600}
.sheet .actions{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap}
.btn{padding:10px 18px;border-radius:2px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:500}
.btn.primary{background:var(--graphite);color:var(--porcelain)}
.btn.primary:hover{background:var(--onyx)}
.btn.ghost{border:1px solid var(--hairline);color:var(--graphite);background:var(--white)}
.btn.danger{border:1px solid var(--hairline);color:var(--taupe);background:var(--white)}
.btn.danger:hover{border-color:var(--taupe)}

/* detail modal */
.dtl .row{display:grid;grid-template-columns:110px 1fr;gap:12px;padding:9px 0;border-bottom:1px solid var(--hairline);font-size:13.5px}
.dtl .row:last-of-type{border-bottom:none}
.dtl .row .k{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ash);padding-top:2px}

/* status */
.statusline{margin-top:26px;padding-top:12px;border-top:1px solid var(--hairline);display:flex;justify-content:space-between;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ash)}
.statusline .warn{color:var(--taupe)}

@media(max-width:860px){
  body{font-size:15px}
  .tab{padding:10px 15px}
  .tab .nm{font-size:13px}
  .seg button{padding:9px 15px}
  .mcell{min-height:56px;padding:6px}
  .mcell .mini{display:none}
  .mcell .more{display:block}
  .datenav{margin-left:0;width:100%;justify-content:space-between}
  .datenav .lbl{min-width:0}
  .icobtn{width:38px;height:38px}
  .toolbar .addbtn{order:-1;width:100%;text-align:center;padding:12px}
  .tgwrap{max-height:70vh;margin:0 -20px;border-left:none;border-right:none;border-radius:0}
}
@media(prefers-reduced-motion:no-preference){
  .sheet{animation:up .18s ease-out}
  @keyframes up{from{transform:translateY(8px);opacity:.6}to{transform:none;opacity:1}}
}
</style>
</head>
<body>
<div class="wrap">

  <header class="masthead">
    <h1>Летний дом</h1>
    <div class="meta"><b>Семейное расписание</b><br>Лето 2026</div>
  </header>
  <div class="dbl"></div>

  <nav class="tabs" id="tabs" aria-label="Члены семьи"></nav>

  <div class="toolbar">
    <div class="seg" id="seg">
      <button data-v="day">День</button>
      <button data-v="week" class="on">Неделя</button>
      <button data-v="month">Месяц</button>
    </div>
    <button class="addbtn" id="addBtn">+ Событие</button>
    <div class="datenav">
      <button class="icobtn" id="prev" aria-label="Назад"><svg width="14" height="14" viewBox="0 0 14 14"><path d="M9 2 L4 7 L9 12"/></svg></button>
      <div class="lbl" id="dateLbl"></div>
      <button class="icobtn" id="next" aria-label="Вперёд"><svg width="14" height="14" viewBox="0 0 14 14"><path d="M5 2 L10 7 L5 12"/></svg></button>
      <button class="todaybtn" id="today">Сегодня</button>
    </div>
  </div>

  <div class="viewtitle" id="viewTitle"></div>
  <main id="view"></main>

  <div class="statusline">
    <span>Летний дом · Зейналовы — Зейналли</span>
    <span id="storageStatus"></span>
  </div>
</div>

<!-- Add / edit -->
<div class="scrim" id="formScrim">
  <div class="sheet" role="dialog" aria-modal="true">
    <h2 id="formTitle">Новое событие</h2>
    <div class="sub" id="formSub"></div>
    <div class="dbl"></div>

    <div class="frow"><label for="fMember">Кто</label>
      <select id="fMember"></select></div>

    <div class="frow"><label for="fTitle">Название</label>
      <input type="text" id="fTitle" placeholder="Прогулка, теннис, завтрак…"></div>

    <div class="frow"><label for="fDate">Дата</label>
      <input type="date" id="fDate"></div>

    <div class="frow">
      <div class="chk"><input type="checkbox" id="fAllDay"><label for="fAllDay" style="margin:0;text-transform:none;letter-spacing:0;font-size:13px;color:var(--graphite)">Весь день</label></div>
    </div>

    <div class="frow" id="timeRow"><label>Время</label>
      <div class="two">
        <input type="time" id="fStart" value="09:00">
        <input type="time" id="fEnd">
      </div>
      <div style="font-size:11px;color:var(--ash);margin-top:5px">Окончание можно не указывать.</div>
    </div>

    <div class="frow"><label for="fRec">Повтор</label>
      <select id="fRec">
        <option value="none">Без повтора</option>
        <option value="daily">Каждый день</option>
        <option value="weekly">По дням недели</option>
        <option value="monthly">Каждый месяц</option>
      </select></div>

    <div class="frow" id="wdaysRow" style="display:none"><label>Дни недели</label>
      <div class="wdays" id="wdays"></div></div>

    <div class="frow" id="untilRow" style="display:none"><label for="fUntil">Повторять до</label>
      <input type="date" id="fUntil" value="2026-08-31"></div>

    <div class="frow"><label for="fNote">Заметка</label>
      <textarea id="fNote" placeholder="Например: бассейн · сауна · теннис"></textarea></div>

    <div class="actions">
      <button class="btn primary" id="fSave">Сохранить</button>
      <button class="btn ghost" id="fCancel">Отмена</button>
    </div>
  </div>
</div>

<!-- Detail -->
<div class="scrim" id="dtlScrim">
  <div class="sheet dtl" role="dialog" aria-modal="true">
    <h2 id="dTitle"></h2>
    <div class="sub" id="dMember"></div>
    <div class="dbl"></div>
    <div class="row"><span class="k">Когда</span><span id="dWhen"></span></div>
    <div class="row"><span class="k">Повтор</span><span id="dRec"></span></div>
    <div class="row" id="dNoteRow"><span class="k">Заметка</span><span id="dNote"></span></div>
    <div class="actions">
      <button class="btn primary" id="dEdit">Изменить</button>
      <button class="btn ghost" id="dSkip" style="display:none">Пропустить этот день</button>
      <button class="btn danger" id="dDelete">Удалить</button>
      <button class="btn ghost" id="dClose">Закрыть</button>
    </div>
  </div>
</div>

<script>
/* ─────────────────────────────────────────
   Летний дом — семейное расписание
   Данные: window.storage (личное хранилище)
────────────────────────────────────────── */

const MEMBERS = [
  {id:'m1', name:'Эльчин Зейналов',   tone:'#9F6B47'},
  {id:'m2', name:'Камилла Зейналова', tone:'#7C6A58'},
  {id:'m3', name:'Гусейн Зейналли',   tone:'#36373B'},
  {id:'m4', name:'Ифа Зейналли',      tone:'#B98B68'},
  {id:'m5', name:'Амина Зейналли',    tone:'#8E8E8A'},
  {id:'m6', name:'Эльчин Зейналли',   tone:'#5E5245'},
  {id:'m7', name:'Али-Аббас Зейналли',tone:'#A99276'},
];
// короткая подпись: имя; если имя встречается дважды — полное имя
const firstCounts = {};
MEMBERS.forEach(m=>{const f=m.name.split(' ')[0]; firstCounts[f]=(firstCounts[f]||0)+1;});
MEMBERS.forEach((m,i)=>{
  const f=m.name.split(' ')[0];
  m.short = firstCounts[f]>1 ? m.name : f;
  m.ix = String(i+1).padStart(2,'0');
});
const memberById = id => MEMBERS.find(m=>m.id===id);

const KEY='family-schedule:v1';
const WD=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const MON_GEN=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const MON_NOM=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

let events=[];                 // все события всех членов семьи
let memoryOnly=false;          // хранилище недоступно → данные живут в памяти
let ui={member:'all', view:'week', date:new Date()};
let editingId=null;            // id события в форме
let dtlCtx=null;               // {id, dateStr} — открытая карточка

/* ── даты ── */
const pad=n=>String(n).padStart(2,'0');
const fmt=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const parse=s=>new Date(s+'T12:00:00');
const mondayIx=d=>(d.getDay()+6)%7;
const addDays=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x;};
const monday=d=>addDays(d,-mondayIx(d));
const todayStr=()=>fmt(new Date());

/* ── правило повторения ── */
function occursOn(ev, ds){
  if(!ev.rec) return ev.date===ds;
  if(ds<ev.date) return false;
  if(ev.rec.until && ds>ev.rec.until) return false;
  if(ev.exceptions && ev.exceptions.includes(ds)) return false;
  const d=parse(ds);
  if(ev.rec.freq==='daily')   return true;
  if(ev.rec.freq==='weekly')  return ev.rec.days.includes(mondayIx(d));
  if(ev.rec.freq==='monthly') return d.getDate()===parse(ev.date).getDate();
  return false;
}
function eventsOn(ds, memberId){
  return events
    .filter(e=>(memberId==='all'||e.memberId===memberId)&&occursOn(e,ds))
    .sort((a,b)=>(a.allDay?'':a.start||'99').localeCompare(b.allDay?'':b.start||'99')||a.title.localeCompare(b.title,'ru'));
}
function recLabel(ev){
  if(!ev.rec) return 'Без повтора';
  const until = ev.rec.until ? ` до ${parse(ev.rec.until).getDate()} ${MON_GEN[parse(ev.rec.until).getMonth()]}` : '';
  if(ev.rec.freq==='daily')   return 'Каждый день'+until;
  if(ev.rec.freq==='weekly')  return ev.rec.days.map(i=>WD[i]).join(' · ')+until;
  if(ev.rec.freq==='monthly') return `Каждое ${parse(ev.date).getDate()} число`+until;
  return '';
}
function timeLabel(ev){
  if(ev.allDay) return 'Весь день';
  return ev.end ? `${ev.start}–${ev.end}` : ev.start;
}

/* ── хранилище ── */
async function load(){
  let seeded=['m1','m3'];
  try{
    const r=await window.storage.get(KEY);
    if(r && r.value){
      const raw=JSON.parse(r.value);
      if(Array.isArray(raw)){            // старый формат — миграция
        events=raw; seeded=['m1'];
      }else{
        events=raw.events||[]; seeded=raw.seeded||['m1'];
      }
      if(!seeded.includes('m3')){        // добавляем расписание Гусейна один раз
        events=events.concat(seedHuseyn());
        seeded.push('m3');
      }
      window.__seeded=seeded;
      await persist();
    }else{
      seedAll(); window.__seeded=seeded; await persist();
    }
  }catch(e){
    try{ seedAll(); window.__seeded=seeded; await persist(); }
    catch(e2){ memoryOnly=true; if(!events.length){seedAll(); window.__seeded=seeded;} }
  }
  updateStatus(); renderAll();
}
async function persist(){
  try{
    await window.storage.set(KEY, JSON.stringify({v:2, seeded:window.__seeded||['m1','m3'], events}));
    memoryOnly=false;
  }
  catch(e){ memoryOnly=true; }
  updateStatus();
}
function updateStatus(){
  const el=document.getElementById('storageStatus');
  el.textContent = memoryOnly ? 'Данные не сохраняются — только в этой сессии' : 'Сохранено';
  el.className = memoryOnly ? 'warn' : '';
}

/* ── стартовые расписания ── */

/* ── рендер ── */
const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function dateLabel(){
  const d=ui.date;
  if(ui.view==='day')  return `${WD[mondayIx(d)]}, ${d.getDate()} ${MON_GEN[d.getMonth()]}`;
  if(ui.view==='month')return `${MON_NOM[d.getMonth()]} ${d.getFullYear()}`;

    ? `${a.getDate()}–${b.getDate()} ${MON_GEN[a.getMonth()]}`
    : `${a.getDate()} ${MON_GEN[a.getMonth()]} – ${b.getDate()} ${MON_GEN[b.getMonth()]}`;

  vt.innerHTML=`<span class="who">${esc(who)}</span><span class="hint">${ui.member==='all'?'общая доска':'личное расписание'}</span>`;

  else if(ui.view==='day') v.innerHTML=dayHTML();

/* ── time grid ── */
const toMin=t=>{const [h,m]=t.split(':').map(Number);return h*60+m;};
const fmtHM=min=>`${pad(Math.floor(min/60))}:${pad(min%60)}`;
const DUR_DEFAULT=45; // видимая длительность события без окончания

function laneLayout(evs){
  // side-by-side раскладка пересекающихся событий (как в Outlook)
  const items=evs.filter(e=>!e.allDay&&e.start).map(e=>({
    e, s:toMin(e.start), en:e.end?Math.max(toMin(e.end),toMin(e.start)+15):toMin(e.start)+DUR_DEFAULT
  })).sort((a,b)=>a.s-b.s||b.en-a.en);
  const clusters=[]; let cur=[], curEnd=-1;
  for(const it of items){
    if(cur.length&&it.s>=curEnd){clusters.push(cur);cur=[];curEnd=-1;}
    cur.push(it); curEnd=Math.max(curEnd,it.en);
  }
  if(cur.length)clusters.push(cur);
  for(const cl of clusters){
    const laneEnds=[];
    for(const it of cl){
      let l=laneEnds.findIndex(end=>end<=it.s);
      if(l===-1){l=laneEnds.length;laneEnds.push(it.en);}else laneEnds[l]=it.en;
      it.lane=l;
    }
    cl.forEach(it=>it.lanes=laneEnds.length);
  }
  return items;
}

function timeGridHTML(cols, opts){
  // cols: [{ds, memberId?, head1, head2, today, tone?, events}]
  const hh = window.innerWidth<=860?46:50;
  let minH=8, maxH=21;
  cols.forEach(c=>c.events.forEach(e=>{
    if(e.allDay||!e.start)return;
    minH=Math.min(minH,Math.floor(toMin(e.start)/60));
    const en=e.end?toMin(e.end):toMin(e.start)+DUR_DEFAULT;
    maxH=Math.max(maxH,Math.ceil(en/60));
  }));
  const totalH=(maxH-minH)*hh;
  const colW = opts.colMin||130;
  const nowM=(()=>{const n=new Date();return n.getHours()*60+n.getMinutes();})();
  const tds=todayStr();

  let head=`<div class="tg-corner">GMT+4</div>`;
  cols.forEach(c=>{
    const ad=c.events.filter(e=>e.allDay);
    head+=`<div class="tg-head${c.today?' today':''}">
      <div class="wd">${esc(c.head1)}</div>
      ${c.head2?`<div class="dn">${esc(c.head2)}</div>`:''}
      ${c.tone?`<div class="tonebar" style="background:${c.tone}"></div>`:''}
      ${ad.map(e=>`<div class="adchip" data-id="${e.id}" data-ds="${c.ds}">· ${esc(e.title)}</div>`).join('')}
    </div>`;
  });

  let axis=`<div class="tg-axis" style="height:${totalH}px">`;
  for(let h=minH+1;h<maxH;h++) axis+=`<div class="hl" style="top:${(h-minH)*hh}px">${pad(h)}:00</div>`;
  axis+=`</div>`;

  let body='';
  cols.forEach(c=>{
    body+=`<div class="tg-col" style="height:${totalH}px" data-ds="${c.ds}"${c.memberId?` data-mid="${c.memberId}"`:''} data-minh="${minH}" data-hh="${hh}">`;
    for(const it of laneLayout(c.events)){
      const e=it.e, m=memberById(e.memberId);
      const top=(it.s-minH*60)/60*hh;
      const hgt=Math.max(22,(it.en-it.s)/60*hh-2);
      const w=100/it.lanes, l=w*it.lane;
      const compact=hgt<40;
      body+=`<div class="tg-ev${compact?' compact':''}" data-id="${e.id}" data-ds="${c.ds}" role="button" tabindex="0"
        style="--tone:${m.tone};top:${top}px;height:${hgt}px;left:calc(${l}% + 2px);width:calc(${w}% - 4px);background:${m.tone}10">
        <div class="t">${esc(e.start)}${e.end?'–'+esc(e.end):''}</div>
        <div class="n">${esc(e.title)}</div>
        ${opts.showMember?`<div class="m">${esc(m.short)}</div>`:''}
      </div>`;
    }
    if(c.ds===tds && nowM>=minH*60 && nowM<=maxH*60)
      body+=`<div class="nowline" style="top:${(nowM-minH*60)/60*hh}px"></div>`;
    body+=`</div>`;
  });

  return `<div class="tgwrap"><div class="tgrid" style="--hh:${hh}px;grid-template-columns:52px repeat(${cols.length},minmax(${colW}px,1fr));grid-template-rows:auto ${totalH}px">
    ${head}${axis}${body}
  </div></div>`;
}

function weekHTML(){
  const a=monday(ui.date), tds=todayStr();
  const cols=[];
  for(let i=0;i<7;i++){
    const d=addDays(a,i), ds=fmt(d);
    cols.push({ds, head1:WD[i], head2:`${d.getDate()} ${MON_GEN[d.getMonth()]}`, today:ds===tds, events:eventsOn(ds,ui.member)});
  }
  return timeGridHTML(cols,{showMember:ui.member==='all', colMin:window.innerWidth<=860?132:110});
}

function freeWindowsHTML(evs){
  // общие окна 09:00–21:00, когда ни у кого нет событий
  const A=9*60, B=21*60, MIN=45;
  const busy=evs.filter(e=>!e.allDay&&e.start).map(e=>[toMin(e.start), e.end?toMin(e.end):toMin(e.start)+DUR_DEFAULT])
    .sort((x,y)=>x[0]-y[0]);
  const merged=[];
  for(const [s,en] of busy){
    if(merged.length&&s<=merged[merged.length-1][1]) merged[merged.length-1][1]=Math.max(merged[merged.length-1][1],en);
    else merged.push([s,en]);
  }
  const free=[]; let cur=A;
  for(const [s,en] of merged){
    if(s-cur>=MIN&&cur<B) free.push([cur,Math.min(s,B)]);
    cur=Math.max(cur,en);
  }
  if(B-cur>=MIN) free.push([cur,B]);
  const chips=free.filter(([s,en])=>en>s).map(([s,en])=>`<span class="chip">${fmtHM(s)}–${fmtHM(en)}</span>`).join('');
  return `<div class="freechips"><span class="flbl">Все свободны</span>${chips||'<span class="none">окон нет</span>'}</div>`;
}

function dayHTML(){
  const ds=fmt(ui.date), tds=todayStr();
  if(ui.member==='all'){
    const all=eventsOn(ds,'all');
    if(!all.length) return `<div class="dayempty"><p>На этот день пока ничего нет — все свободны.</p><button class="btn primary" id="emptyAdd">+ Добавить событие</button></div>`;
    const cols=MEMBERS.map(m=>({
      ds, memberId:m.id, head1:m.short, today:ds===tds, tone:m.tone,
      events:all.filter(e=>e.memberId===m.id)
    }));
    const who=new Set(all.map(e=>e.memberId));
    return `<div class="daysummary">${all.length} ${plural(all.length,'событие','события','событий')} · ${who.size} ${plural(who.size,'участник','участника','участников')}</div>`
      + freeWindowsHTML(all)
      + timeGridHTML(cols,{showMember:false, colMin:window.innerWidth<=860?116:96});
  }
  const evs=eventsOn(ds,ui.member);
  if(!evs.length) return `<div class="dayempty"><p>На этот день пока ничего нет.</p><button class="btn primary" id="emptyAdd">+ Добавить событие</button></div>`;
  const m=memberById(ui.member);
  const col=[{ds, memberId:m.id, head1:WD[mondayIx(ui.date)], head2:`${ui.date.getDate()} ${MON_GEN[ui.date.getMonth()]}`, today:ds===tds, events:evs}];
  return timeGridHTML(col,{showMember:false, colMin:280});
}
function plural(n,a,b,c){const m=n%100;if(m>=11&&m<=14)return c;const d=n%10;return d===1?a:(d>=2&&d<=4?b:c);}

function monthHTML(){
  const y=ui.date.getFullYear(), mo=ui.date.getMonth();
  const first=new Date(y,mo,1), start=monday(first), tds=todayStr();
  let out='<div class="mgrid">'+WD.map(w=>`<div class="mwd">${w}</div>`).join('');
  for(let i=0;i<42;i++){
    const d=addDays(start,i);
    if(i>=35 && d.getMonth()!==mo) break;
    const ds=fmt(d), dim=d.getMonth()!==mo;
    const evs=dim?[]:eventsOn(ds,ui.member);
    const shown=evs.slice(0,2);
    out+=`<div class="mcell${dim?' dim':''}${ds===tds?' today':''}" data-ds="${ds}" role="button" tabindex="0">
      <span class="num">${d.getDate()}</span>
      ${shown.map(e=>`<span class="mini">${e.allDay?'':esc(e.start)+' '}<b>${esc(e.title)}</b></span>`).join('')}
      ${evs.length>2?`<span class="more">+${evs.length-2}</span>`:(evs.length&&window.innerWidth<=860?`<span class="more">${evs.length}</span>`:'')}
    </div>`;
  }
  return out+'</div>';
}

function bindView(){
  document.querySelectorAll('#view .tg-ev, #view .adchip').forEach(el=>{
    const open=e=>{e.stopPropagation();openDetail(el.dataset.id, el.dataset.ds);};
    el.onclick=open;
    el.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();open(e);}};
  });
  // быстрый ввод: тап по пустому месту сетки → форма с датой и временем
  document.querySelectorAll('#view .tg-col').forEach(col=>{
    col.onclick=e=>{
      if(e.target!==col) return;
      const rect=col.getBoundingClientRect();
      const hh=+col.dataset.hh, minH=+col.dataset.minh;
      let min=minH*60 + Math.round(((e.clientY-rect.top)/hh*60)/30)*30;
      min=Math.max(0,Math.min(23*60,min));
      openFormAt({ds:col.dataset.ds, start:fmtHM(min), memberId:col.dataset.mid});
    };
  });
  document.querySelectorAll('#view .mcell:not(.dim)').forEach(el=>{
    const go=()=>{ui.date=parse(el.dataset.ds);ui.view='day';renderAll();};
    el.onclick=go;
    el.onkeydown=e=>{if(e.key==='Enter'){go();}};
  });
  const ea=$('emptyAdd'); if(ea) ea.onclick=()=>openForm();
}

/* ── форма ── */
const F={member:'fMember',title:'fTitle',date:'fDate',allDay:'fAllDay',start:'fStart',end:'fEnd',rec:'fRec',until:'fUntil',note:'fNote'};
let wdaySel=[], wdayTouched=false;

function buildWdays(){
  const box=$('wdays'); box.innerHTML='';
  WD.forEach((w,i)=>{
    const b=document.createElement('button');
    b.type='button'; b.textContent=w;
    b.className=wdaySel.includes(i)?'on':'';
    b.onclick=()=>{wdayTouched=true;wdaySel=wdaySel.includes(i)?wdaySel.filter(x=>x!==i):[...wdaySel,i].sort();buildWdays();};
    box.appendChild(b);
  });
}
function syncFormVis(){
  $('timeRow').style.display = $(F.allDay).checked?'none':'';
  const r=$(F.rec).value;
  $('wdaysRow').style.display = r==='weekly'?'':'none';
  $('untilRow').style.display = r==='none'?'none':'';
}
function openForm(ev){
  editingId = ev?ev.id:null;
  $('formTitle').textContent = ev?'Изменить событие':'Новое событие';
  $('formSub').textContent = ev?recLabel(ev):'';
  const sel=$(F.member); sel.innerHTML=MEMBERS.map(m=>`<option value="${m.id}">${esc(m.name)}</option>`).join('');
  sel.value = ev?ev.memberId : (ui.member!=='all'?ui.member:MEMBERS[0].id);
  $(F.title).value = ev?ev.title:'';
  $(F.date).value  = ev?ev.date:(ui.view==='day'?fmt(ui.date):todayStr());
  $(F.allDay).checked = ev?!!ev.allDay:false;
  $(F.start).value = ev&&ev.start?ev.start:'09:00';
  $(F.end).value   = ev&&ev.end?ev.end:'';
  $(F.rec).value   = ev&&ev.rec?ev.rec.freq:'none';
  $(F.until).value = ev&&ev.rec&&ev.rec.until?ev.rec.until:'2026-08-31';
  $(F.note).value  = ev?ev.note||'':'';
  wdaySel = ev&&ev.rec&&ev.rec.freq==='weekly'?[...ev.rec.days]:[mondayIx(parse($(F.date).value))];
  wdayTouched = !!(ev&&ev.rec&&ev.rec.freq==='weekly');
  buildWdays(); syncFormVis();
  $('formScrim').classList.add('on');
  setTimeout(()=>$(F.title).focus(),50);
}
function closeForm(){ $('formScrim').classList.remove('on'); editingId=null; }

function openFormAt({ds,start,memberId}){
  openForm();
  if(ds) $(F.date).value=ds;
  if(start){
    $(F.start).value=start;
    const en=Math.min(23*60+30,toMin(start)+60);
    $(F.end).value=fmtHM(en);
  }
  if(memberId) $(F.member).value=memberId;
  if(!wdayTouched && $(F.date).value){ wdaySel=[mondayIx(parse($(F.date).value))]; buildWdays(); }
}

async function saveForm(){
  const title=$(F.title).value.trim();
  if(!title){ $(F.title).focus(); return; }
  const recV=$(F.rec).value;
  const ev={
    id: editingId || 'e'+Math.random().toString(36).slice(2,10),
    memberId: $(F.member).value,
    title,
    date: $(F.date).value || todayStr(),
    allDay: $(F.allDay).checked,
    start: $(F.allDay).checked?'':$(F.start).value,
    end:   $(F.allDay).checked?'':$(F.end).value,
    rec: recV==='none'?null:{
      freq:recV,
      days: recV==='weekly'?(wdaySel.length?wdaySel:[mondayIx(parse($(F.date).value))]):[],
      until: $(F.until).value||null
    },
    exceptions: [],
    note: $(F.note).value.trim()
  };
  if(editingId){
    const old=events.find(e=>e.id===editingId);
    if(old&&old.exceptions) ev.exceptions=old.exceptions;
    events=events.map(e=>e.id===editingId?ev:e);
  }else events.push(ev);
  await persist(); closeForm(); renderAll();
}

/* ── карточка события ── */
function openDetail(id, ds){
  const ev=events.find(e=>e.id===id); if(!ev) return;
  dtlCtx={id,ds};
  const d=parse(ds), m=memberById(ev.memberId);
  $('dTitle').textContent=ev.title;
  $('dMember').textContent=`${m.ix} · ${m.name}`;
  $('dWhen').textContent=`${WD[mondayIx(d)]}, ${d.getDate()} ${MON_GEN[d.getMonth()]} · ${timeLabel(ev)}`;
  $('dRec').textContent=recLabel(ev);
  $('dNoteRow').style.display=ev.note?'':'none';
  $('dNote').textContent=ev.note||'';
  $('dSkip').style.display=ev.rec?'':'none';
  $('dDelete').textContent=ev.rec?'Удалить серию':'Удалить';
  $('dtlScrim').classList.add('on');
}
function closeDetail(){ $('dtlScrim').classList.remove('on'); dtlCtx=null; }

/* ── навигация ── */
function shift(n){
  if(ui.view==='day')   ui.date=addDays(ui.date,n);
  if(ui.view==='week')  ui.date=addDays(ui.date,7*n);
  if(ui.view==='month'){const d=new Date(ui.date);d.setDate(1);d.setMonth(d.getMonth()+n);ui.date=d;}
  renderAll();
}

/* ── события UI ── */
$('seg').addEventListener('click',e=>{const b=e.target.closest('button');if(b){ui.view=b.dataset.v;renderAll();}});
$('prev').onclick=()=>shift(-1);
$('next').onclick=()=>shift(1);
$('today').onclick=()=>{ui.date=new Date();renderAll();};
$('addBtn').onclick=()=>openForm();
$('fCancel').onclick=closeForm;
$('fSave').onclick=saveForm;
$(F.allDay).onchange=syncFormVis;
$(F.rec).onchange=syncFormVis;
$(F.date).onchange=()=>{ if(!wdayTouched && $(F.date).value){ wdaySel=[mondayIx(parse($(F.date).value))]; buildWdays(); } };
$('formScrim').addEventListener('click',e=>{if(e.target.id==='formScrim')closeForm();});
$('dtlScrim').addEventListener('click',e=>{if(e.target.id==='dtlScrim')closeDetail();});
$('dClose').onclick=closeDetail;
$('dEdit').onclick=()=>{const ev=events.find(e=>e.id===dtlCtx.id);closeDetail();openForm(ev);};
$('dSkip').onclick=async()=>{
  const ev=events.find(e=>e.id===dtlCtx.id);
  if(ev){ ev.exceptions=ev.exceptions||[]; if(!ev.exceptions.includes(dtlCtx.ds)) ev.exceptions.push(dtlCtx.ds); }
  await persist(); closeDetail(); renderAll();
};
$('dDelete').onclick=async()=>{
  events=events.filter(e=>e.id!==dtlCtx.id);
  await persist(); closeDetail(); renderAll();
};
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ closeForm(); closeDetail(); }
});

load();
</script>
